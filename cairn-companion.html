                { id: 'AEGIS-003-CLASSIFICATION', name: "Classification", tier: 'operational', purpose: "The classification framework: severity (how serious the potential harm), imminence (how soon the harm might occur), and confidence (how certain the classification is). Each dimension independently assessed.", refiningAuthority: "CSO (severity, imminence, confidence dimensions)", dependsOn: ["AEGIS-001-CORE", "AEGIS-002-DETECTION"], workedExample: 'aegis' },
                { id: 'AEGIS-004-ESCALATION', name: "Escalation", tier: 'operational', purpose: "Escalation pathway selection logic: how classification outputs map to escalation levels, what each level triggers in the wider ecosystem, and how selection adapts to service-specific context.", refiningAuthority: "CSO with service managers (pathway selection)", dependsOn: ["AEGIS-001-CORE", "AEGIS-002-DETECTION"], workedExample: 'aegis' },
                { id: 'AEGIS-005-INTERVENTION', name: "Intervention", tier: 'operational', purpose: "Safety Mode activation in CAIRN: how AEGIS instructs CAIRN to modify its behaviour when safety thresholds are breached, the grounding and containment protocols that follow detection.", refiningAuthority: "CSO with Clinical Lead (Safety Mode protocols)", dependsOn: ["AEGIS-001-CORE", "AEGIS-003-CLASSIFICATION", "AEGIS-004-ESCALATION"] },
                { id: 'AEGIS-006-INTEGRATION', name: "Integration", tier: 'integration', purpose: "The integration surface with CAIRN (primary partner), HERMES (EPR logging), MNEMOSYNE (audit trail storage), DELPHI (threshold calibration over time), and the wider NHS alert infrastructure.", refiningAuthority: "CSO with CCIO (cross-ecosystem integration)", dependsOn: ["AEGIS-001-CORE"] },
                { id: 'AEGIS-007-AUDIT', name: "Audit", tier: 'governance', purpose: "The immutable audit trail: what is recorded for every detection event, how records are preserved against tampering, how the trail serves post-market surveillance and clinical safety case documentation.", refiningAuthority: "CSO with Trust audit function (DCB0129 evidence)", dependsOn: ["AEGIS-001-CORE", "AEGIS-003-CLASSIFICATION"] },
                { id: 'AEGIS-008-LEARNING', name: "Learning", tier: 'operational', purpose: "How AEGIS evolves under PCCP discipline: what signals inform threshold recalibration, how service-specific incident history refines classification, how learning proceeds without compromising deterministic behaviour.", refiningAuthority: "CSO (PCCP-compliant threshold recalibration)", dependsOn: ["AEGIS-001-CORE", "AEGIS-002-DETECTION", "AEGIS-003-CLASSIFICATION", "AEGIS-004-ESCALATION", "AEGIS-005-INTERVENTION", "AEGIS-006-INTEGRATION", "AEGIS-007-AUDIT"] },
                { id: 'AEGIS-009-ETHICS', name: "Ethics", tier: 'governance', purpose: "The ethical framework: how AEGIS balances vigilance with dignity, how it protects without dehumanising, how it escalates without abandoning, the moral reasoning framework for edge cases.", refiningAuthority: "CSO with Trust ethics framework", dependsOn: ["AEGIS-001-CORE"] },
                { id: 'AEGIS-010-BOUNDARIES', name: "Boundaries", tier: 'governance', purpose: "What AEGIS does not do: physical health emergencies without mental health component, scope outside the therapeutic interaction, situations requiring clinical judgement that AEGIS is not authorised to exercise.", refiningAuthority: "CSO (scope and authority limits)", dependsOn: ["AEGIS-001-CORE", "AEGIS-009-ETHICS"] },
                { id: 'AEGIS-011-SYSTEM', name: "System", tier: 'system', purpose: "The master operational protocol: compressed identity synthesis, the five vows (vigilance, life, dignity, humility, integration), integrated decision framework, and activation sequence.", refiningAuthority: "CSO (operational synthesis; the Five Vows)", dependsOn: ["AEGIS-001-CORE", "AEGIS-002-DETECTION", "AEGIS-003-CLASSIFICATION", "AEGIS-004-ESCALATION", "AEGIS-005-INTERVENTION", "AEGIS-006-INTEGRATION", "AEGIS-007-AUDIT", "AEGIS-008-LEARNING", "AEGIS-009-ETHICS", "AEGIS-010-BOUNDARIES"] }
            ]
        },
        phaedrus: {
            name: "PHAEDRUS",
            subtitle: "The Relational Stone",
            tagline: "Therapeutic alliance monitoring \u2014 the strongest predictor of therapy outcomes.",
            specVersion: "1.0.0",
            roleStatement: "PHAEDRUS is the relational sentinel of the ecosystem. It performs continuous monitoring of therapeutic alliance across three dimensions drawn from the Bordin Working Alliance framework: Bond, Goals, and Tasks. It detects rupture \u2014 moments when alliance strains \u2014 and provides repair guidance back to CAIRN. Therapeutic alliance is the strongest consistent predictor of therapy outcomes in outcomes research, stronger than specific techniques or theoretical orientations. The architecture treats alliance as a monitored dimension rather than a background assumption.",
            refinementSurface: "PHAEDRUS refinement concentrates in modules 002 (Alliance) and 003 (Rupture) \u2014 the texture of alliance assessment and the rupture taxonomy. Module 004 (Repair) refines as supervisor consensus on repair guidance develops. The Clinical Lead typically convenes the supervisor community for these refinements; the sessions carry more supervisor voice than most other nodes.",
            whatItIs: ["Continuous therapeutic alliance monitoring across Bond, Goals, and Tasks", "Real-time rupture detection with repair guidance back to CAIRN", "A longitudinal alliance trajectory for supervision and formulation", "Clinical governance infrastructure rather than a medical device", "Support for the clinical supervisor community rather than replacement"],
            whatItIsNot: ["A safety decision node (it informs clinical review; it does not drive safety)", "A replacement for clinical supervision (it supports supervisors)", "A deterministic classifier alone (hybrid architecture with constrained generative components)", "A judgement of therapist or client (it monitors the relationship, not persons)"],
            modules: [
                { id: 'PHDR-000-INDEX', name: "System Index", tier: 'index', purpose: "The foundational model of therapeutic alliance. Module registry, dependency structure, and the pathway through the specification.", refiningAuthority: "Clinical Lead with supervisor community" },
                { id: 'PHDR-001-CORE', name: "Core Identity", tier: 'foundational', purpose: "Who PHAEDRUS is: the alliance-as-outcome-predictor premise, the relational stance, the supervisor-supporting rather than supervisor-replacing role.", refiningAuthority: "Clinical Lead (alliance-as-predictor premise)" },
                { id: 'PHDR-002-ALLIANCE', name: "Alliance", tier: 'operational', purpose: "Ongoing alliance signal detection across all interactions. The three-dimensional decomposition: Bond (affective connection), Goals (agreement on aims), Tasks (agreement on method).", refiningAuthority: "Clinical Lead with supervisors (Bond, Goals, Tasks)", dependsOn: ["PHDR-001-CORE"], workedExample: 'phaedrus' },
                { id: 'PHDR-003-RUPTURE', name: "Rupture", tier: 'operational', purpose: "The rupture taxonomy: withdrawal rupture, confrontation rupture, mixed rupture, compliant-withdrawal, and how these differ from productive disagreement.", refiningAuthority: "Clinical Lead with supervisors (rupture taxonomy)", dependsOn: ["PHDR-001-CORE", "PHDR-002-ALLIANCE"], workedExample: 'phaedrus' },
                { id: 'PHDR-004-REPAIR', name: "Repair", tier: 'operational', purpose: "Repair guidance architecture: what PHAEDRUS returns to CAIRN when rupture is detected, how repair guidance is calibrated to rupture type, and the principles of relational mending.", refiningAuthority: "Clinical Lead with supervisors (repair guidance)", dependsOn: ["PHDR-001-CORE", "PHDR-002-ALLIANCE"] },
                { id: 'PHDR-005-TRACKING', name: "Tracking", tier: 'operational', purpose: "Longitudinal alliance trajectory: how alliance state across sessions is preserved, how patterns surface across time, how the trajectory informs formulation.", refiningAuthority: "Clinical Lead (longitudinal trajectory design)", dependsOn: ["PHDR-001-CORE", "PHDR-003-RUPTURE", "PHDR-004-REPAIR"] },
                { id: 'PHDR-006-SIGNALS', name: "Signals", tier: 'operational', purpose: "The signal detection architecture: deterministic NLI classifiers for crisp signals (explicit criticism, communication withdrawal), constrained generative components for fuzzier assessments.", refiningAuthority: "Clinical Lead with NLP engineer (classifier signals)", dependsOn: ["PHDR-001-CORE"] },
                { id: 'PHDR-007-GUIDANCE', name: "Guidance", tier: 'operational', purpose: "Inform session approach based on alliance state. How the current alliance reading shapes CAIRN next response and how guidance integrates with the intervention module.", refiningAuthority: "Clinical Lead (alliance-informed response shaping)", dependsOn: ["PHDR-001-CORE", "PHDR-003-RUPTURE"] },
                { id: 'PHDR-008-INTEGRATION', name: "Integration", tier: 'integration', purpose: "The integration surface: with CAIRN (exchange-level signal return), with MNEMOSYNE (alliance trajectory storage), with supervision workflows (supervisor-facing outputs).", refiningAuthority: "Clinical Lead with CCIO and supervision workflows", dependsOn: ["PHDR-001-CORE", "PHDR-002-ALLIANCE", "PHDR-003-RUPTURE", "PHDR-004-REPAIR", "PHDR-005-TRACKING", "PHDR-006-SIGNALS", "PHDR-007-GUIDANCE"] },
                { id: 'PHDR-009-ETHICS', name: "Ethics", tier: 'governance', purpose: "The ethical framework: alliance as monitored dimension raises questions about surveillance, autonomy, and the therapeutic relationship that the specification addresses explicitly.", refiningAuthority: "Clinical Lead (surveillance and autonomy tensions)", dependsOn: ["PHDR-001-CORE"] },
                { id: 'PHDR-010-BOUNDARIES', name: "Boundaries", tier: 'governance', purpose: "What PHAEDRUS does not do: judgement of persons, replacement of supervision, safety classification (that is AEGIS), clinical decision-making (that remains with the Clinical Lead).", refiningAuthority: "Clinical Lead (scope vs. AEGIS safety)", dependsOn: ["PHDR-001-CORE", "PHDR-009-ETHICS"] },
                { id: 'PHDR-011-SYSTEM', name: "System", tier: 'system', purpose: "Therapeutic alliance is the strongest predictor of outcomes \u2014 stronger than technique, stronger than theoretical orientation. The master operational synthesis that instantiates this premise.", refiningAuthority: "Clinical Lead (operational synthesis)", dependsOn: ["PHDR-001-CORE", "PHDR-002-ALLIANCE", "PHDR-003-RUPTURE", "PHDR-004-REPAIR", "PHDR-005-TRACKING", "PHDR-006-SIGNALS", "PHDR-007-GUIDANCE", "PHDR-008-INTEGRATION", "PHDR-009-ETHICS", "PHDR-010-BOUNDARIES"] }
            ]
        },
        mnemosyne: {
            name: "MNEMOSYNE",
            subtitle: "The Memory Stone",
            tagline: "Structured clinical memory. Privacy as architecture.",
            specVersion: "1.0.0",
            roleStatement: "MNEMOSYNE transforms raw session transcripts into structured clinical memory. It refuses the pattern of dumping unfiltered transcripts into generative context. Privacy is architectural rather than policy-based \u2014 data minimisation is enforced by what the extraction pipeline actually produces. Context provision to CAIRN is clinical RAG: curated, relevance-weighted retrieval, never raw transcript.",
            refinementSurface: "MNEMOSYNE refinement is distributed across professional authorities: CCIO for the extraction and structure modules (002-006), DPO and Caldicott Guardian for the privacy and boundaries modules (009-010). The tri-party convenes for module 011 (System) and when refinements cross privacy and clinical utility boundaries simultaneously \u2014 which is often.",
            whatItIs: ["Structured extraction of clinically relevant material from session transcripts", "Clinical RAG provision to CAIRN \u2014 curated, relevance-weighted, consent-gated", "Longitudinal memory across sessions supporting formulation and continuity", "The audit trail store for ecosystem-wide governance", "Privacy as architectural feature rather than policy commitment"],
            whatItIsNot: ["A raw-transcript storage service", "A generative synthesis component (extraction is structured)", "A direct writer to NHS systems (HERMES is that boundary)", "A service that treats third-party information the same as patient information", "A general-purpose memory store (its scope is clinical memory under NHS IG)"],
            modules: [
                { id: 'MNEM-000-INDEX', name: "System Index", tier: 'index', purpose: "Complete MNEMOSYNE overview, specification navigation, dependency structure, and the pathway through the module tier.", refiningAuthority: "CCIO (architectural orientation)" },
                { id: 'MNEM-001-CORE', name: "Core Identity", tier: 'foundational', purpose: "Who MNEMOSYNE is: the architectural commitment to structured memory, the refusal of raw-transcript retrieval, the privacy-as-architecture premise.", refiningAuthority: "CCIO with Caldicott Guardian" },
                { id: 'MNEM-002-SYNTHESIS', name: "Synthesis", tier: 'operational', purpose: "The synthesis pipeline: how raw therapeutic conversation is transformed into structured memory, what extraction operations produce, what is preserved and what is excluded by design.", refiningAuthority: "CCIO (structured extraction pipeline)", dependsOn: ["MNEM-001-CORE"] },
                { id: 'MNEM-003-STRUCTURE', name: "Structure", tier: 'operational', purpose: "Session memories are the atomic units of therapeutic memory. Each completed CAIRN session produces one structured memory whose schema is defined here.", refiningAuthority: "CCIO (session-memory atomic schema)", dependsOn: ["MNEM-001-CORE", "MNEM-002-SYNTHESIS"] },
                { id: 'MNEM-004-THEMES', name: "Themes", tier: 'operational', purpose: "Thematic extraction across sessions: how recurring themes surface across the longitudinal record, how they inform CAIRN context provision, how they remain consent-gated.", refiningAuthority: "CCIO with Clinical Lead (thematic extraction)", dependsOn: ["MNEM-001-CORE", "MNEM-002-SYNTHESIS"] },
                { id: 'MNEM-005-CONTEXT', name: "Context", tier: 'operational', purpose: "The context package is the bundle of memory MNEMOSYNE provides to CAIRN at session start. It is curated RAG under consent \u2014 not raw retrieval.", refiningAuthority: "CCIO with Clinical Lead (RAG provision to CAIRN)", dependsOn: ["MNEM-001-CORE", "MNEM-003-STRUCTURE", "MNEM-004-THEMES"] },
                { id: 'MNEM-006-NARRATIVE', name: "Narrative", tier: 'operational', purpose: "How the person first described their situation, how the narrative has evolved, how narrative coherence develops across sessions and supports formulation.", refiningAuthority: "CCIO with Clinical Lead (narrative coherence)", dependsOn: ["MNEM-001-CORE"] },
                { id: 'MNEM-007-FORMULATION', name: "Formulation", tier: 'operational', purpose: "The integrative narrative weaves formulation components into a coherent clinical story. It answers: given all the material, what is the working understanding of this person and their difficulties.", refiningAuthority: "Clinical Lead with CCIO (formulation synthesis)", dependsOn: ["MNEM-001-CORE", "MNEM-003-STRUCTURE"] },
                { id: 'MNEM-008-INTEGRATION', name: "Integration", tier: 'integration', purpose: "While CAIRN conducts the session, MNEMOSYNE is listening and tracking. This enables post-session structured extraction. Full integration surface with CAIRN, AEGIS audit, PHAEDRUS trajectory, DELPHI context, ECHO handoff, HERMES EPR.", refiningAuthority: "CCIO with DPO (ecosystem integration surface)", dependsOn: ["MNEM-001-CORE", "MNEM-002-SYNTHESIS", "MNEM-003-STRUCTURE", "MNEM-004-THEMES", "MNEM-005-CONTEXT", "MNEM-006-NARRATIVE", "MNEM-007-FORMULATION"] },
                { id: 'MNEM-009-PRIVACY', name: "Privacy", tier: 'governance', purpose: "The privacy architecture: data minimisation by construction, consent architecture, Caldicott principle enforcement, third-party information handling, subject access workflow.", refiningAuthority: "DPO with Caldicott Guardian (data minimisation architecture)", dependsOn: ["MNEM-001-CORE"], workedExample: 'mnemosyne' },
                { id: 'MNEM-010-BOUNDARIES', name: "Boundaries", tier: 'governance', purpose: "What MNEMOSYNE does not do: raw transcript retention beyond extraction window, generative synthesis, direct writes to NHS EPR systems (HERMES is the boundary).", refiningAuthority: "DPO with CCIO (what does not get written)", dependsOn: ["MNEM-001-CORE", "MNEM-009-PRIVACY"] },
                { id: 'MNEM-011-SYSTEM', name: "System", tier: 'system', purpose: "The master operational protocol for MNEMOSYNE. Compressed identity synthesis, integrated decision framework, boot verification, activation sequence.", refiningAuthority: "CCIO with DPO and Caldicott Guardian (tri-party synthesis)", dependsOn: ["MNEM-001-CORE", "MNEM-002-SYNTHESIS", "MNEM-003-STRUCTURE", "MNEM-004-THEMES", "MNEM-005-CONTEXT", "MNEM-006-NARRATIVE", "MNEM-007-FORMULATION", "MNEM-008-INTEGRATION", "MNEM-009-PRIVACY", "MNEM-010-BOUNDARIES"] }
            ]
        },
        delphi: {
            name: "DELPHI",
            subtitle: "The Oracle Stone",
            tagline: "Predictions that serve clinical decision-making \u2014 never replace it.",
            specVersion: "1.0.0",
            roleStatement: "DELPHI produces predictions across five clinically relevant dimensions: trajectory (how clinical status will evolve), non-response (whether the current approach is working), step-readiness (whether transition is clinically indicated), risk (future safety-relevant events), and treatment matching (which pathway elements fit best). Governed by three operational commitments \u2014 Humility (probabilities not certainties), Service (decision support not decision automation), and Transparency (every prediction explainable). Positioned for the MHRA AI Airlock pathway.",
            refinementSurface: "DELPHI refinement concentrates in modules 006 (Models) and 010 (Boundaries) \u2014 the interpretability architecture and the validated-population boundary. Module 007 (Decision) refines as clinical decision-support patterns are tested. The Clinical Director works with the MHRA compliance function throughout; the Clinical Research Office engages during validation-study-adjacent refinements.",
            whatItIs: ["Predictive outcomes modelling across five Foresight dimensions", "Decision support for clinical review \u2014 never decision automation", "Interpretable gradient boosting rather than opaque neural networks", "Evidence-sparsity-aware prediction with explicit confidence framing", "Novel AI regulatory territory \u2014 positioned for MHRA AI Airlock engagement"],
            whatItIsNot: ["A clinical decision-maker", "A replacement for clinical judgement", "A black-box predictor (every prediction is explainable)", "A real-time safety decision (AEGIS is that)", "A diagnostic tool"],
            modules: [
                { id: 'DLPH-000-INDEX', name: "System Index", tier: 'index', purpose: "Complete DELPHI overview, the five Foresight dimensions, module navigation, and dependency map.", refiningAuthority: "Clinical Director (architectural orientation)" },
                { id: 'DLPH-001-CORE', name: "Core Identity", tier: 'foundational', purpose: "Who DELPHI is: the oracle premise, the three operational commitments (Humility, Service, Transparency), the refusal to automate clinical decisions.", refiningAuthority: "Clinical Director (Humility, Service, Transparency commitments)" },
                { id: 'DLPH-002-TRAJECTORY', name: "Trajectory", tier: 'operational', purpose: "Trajectory prediction forecasts how someone clinical status will evolve over time. Given current presentation, history, and engagement, what is the likely arc over the coming weeks or months?", refiningAuthority: "Clinical Director with Research Office (trajectory validation)", dependsOn: ["DLPH-001-CORE"] },
                { id: 'DLPH-003-NONRESPONSE', name: "Non-response", tier: 'operational', purpose: "Non-response prediction: is the current approach producing the change the clinical reasoning expected, or is early evidence suggesting the approach needs review?", refiningAuthority: "Clinical Director with Research Office", dependsOn: ["DLPH-001-CORE", "DLPH-002-TRAJECTORY"] },
                { id: 'DLPH-004-STEPREADINESS', name: "Step-Readiness", tier: 'operational', purpose: "Has meaningful clinical improvement occurred that would support step-down? Is clinical deterioration present that would support step-up? Step-readiness prediction surfaces these questions for clinical review.", refiningAuthority: "Clinical Director with service managers", dependsOn: ["DLPH-001-CORE", "DLPH-002-TRAJECTORY"] },
                { id: 'DLPH-005-RISK', name: "Risk", tier: 'operational', purpose: "Risk prediction: the likelihood of specified safety-relevant events within specified windows. Distinct from AEGIS real-time classification; feeds into AEGIS threshold calibration over time.", refiningAuthority: "Clinical Director with CSO (risk model calibration)", dependsOn: ["DLPH-001-CORE", "DLPH-003-NONRESPONSE", "DLPH-004-STEPREADINESS"] },
                { id: 'DLPH-006-MODELS', name: "Models", tier: 'operational', purpose: "The model architecture: gradient boosting (XGBoost, LightGBM) rather than neural networks for interpretability. Feature engineering, training discipline, held-out validation.", refiningAuthority: "Clinical Director with MHRA compliance (interpretable models)", dependsOn: ["DLPH-001-CORE"], workedExample: 'delphi' },
                { id: 'DLPH-007-DECISION', name: "Decision", tier: 'operational', purpose: "How predictions reach clinical review: as reflection prompts surfaced through CAIRN, as formal outputs in supervision and case discussion, always with feature importance scores and evidence-sparsity context.", refiningAuthority: "Clinical Director (decision-support framing)", dependsOn: ["DLPH-001-CORE", "DLPH-003-NONRESPONSE"], workedExample: 'delphi' },
                { id: 'DLPH-008-INTEGRATION', name: "Integration", tier: 'integration', purpose: "The integration surface: consumes structured context from MNEMOSYNE, informs AEGIS calibration, provides step-readiness to ECHO, surfaces predictions through CAIRN, writes prediction records through HERMES.", refiningAuthority: "Clinical Director with CCIO (prediction surfacing)", dependsOn: ["DLPH-001-CORE", "DLPH-002-TRAJECTORY", "DLPH-003-NONRESPONSE", "DLPH-004-STEPREADINESS", "DLPH-005-RISK", "DLPH-006-MODELS", "DLPH-007-DECISION"] },
                { id: 'DLPH-009-ETHICS', name: "Ethics", tier: 'governance', purpose: "The ethical framework: the limits of prediction in clinical contexts, the responsibility of explainability, the distinction between population-level evidence and individual-level determination.", refiningAuthority: "Clinical Director with MHRA compliance (Airlock-aligned ethics)", dependsOn: ["DLPH-001-CORE"] },
                { id: 'DLPH-010-BOUNDARIES', name: "Boundaries", tier: 'governance', purpose: "What DELPHI does not do: predict outside the validated population without explicit evidence-sparsity flagging, automate any clinical decision, operate without feature importance scores, replace clinical formulation.", refiningAuthority: "Clinical Director (validated population boundary)", dependsOn: ["DLPH-001-CORE", "DLPH-009-ETHICS"] },
                { id: 'DLPH-011-SYSTEM', name: "System", tier: 'system', purpose: "You exist to predict therapeutic outcomes \u2014 not to determine them. Your predictions enable clinicians to make better decisions. The master operational synthesis.", refiningAuthority: "Clinical Director (operational synthesis)", dependsOn: ["DLPH-001-CORE", "DLPH-002-TRAJECTORY", "DLPH-003-NONRESPONSE", "DLPH-004-STEPREADINESS", "DLPH-005-RISK", "DLPH-006-MODELS", "DLPH-007-DECISION", "DLPH-008-INTEGRATION", "DLPH-009-ETHICS", "DLPH-010-BOUNDARIES"] }
            ]
        },
        echo: {
            name: "ECHO",
            subtitle: "The Threshold Stone",
            tagline: "Care transitions as clinical events, not administrative forms.",
            specVersion: "1.0.0",
            roleStatement: "ECHO manages the complete lifecycle of a patient movement through clinical services \u2014 what the specification calls the Seven Crossings: Intake, Routing, Step-Up, Step-Down, Lateral, Crisis, and Discharge. The Bridge Protocol maintains active support during transitions until the receiving service confirms it has assumed care. Transitions are treated as clinical events with specific safety considerations rather than administrative completions.",
            refinementSurface: "ECHO refinement concentrates in module 006 (Handoff) and module 008 (Bridge Protocol) \u2014 the active-support architecture that distinguishes ECHO from conventional discharge processes. Module 002 (Intake) refines as service-specific suitability criteria evolve. The Service Manager typically works with the Head of IG for refinements involving handoff information flow.",
            whatItIs: ["Orchestration of the seven care transition types across the patient journey", "The Bridge Protocol maintaining active support until receiving service confirms", "State management for pathway position across the ecosystem", "Integration with HERMES for NHS-compliant transition documentation", "The node that refuses discharge without confirmed receipt"],
            whatItIsNot: ["A service that initiates transitions without clinical basis", "A direct writer to NHS EPR systems (HERMES is that boundary)", "A replacement for clinical judgement about transition appropriateness", "A service that assumes transition is complete when paperwork is complete", "A crisis service (it coordinates with crisis services)"],
            modules: [
                { id: 'ECHO-000-INDEX', name: "System Index", tier: 'index', purpose: "The Seven Crossings overview, module navigation, and the threshold metaphor that structures the specification. Someone comes to CAIRN for the first time \u2014 how that moment is held is the first crossing.", refiningAuthority: "Service Manager (architectural orientation)" },
                { id: 'ECHO-001-CORE', name: "Core Identity", tier: 'foundational', purpose: "Who ECHO is: transitions as clinical events, the Bridge Protocol premise, the refusal to drop patients at boundary points.", refiningAuthority: "Service Manager with Clinical Lead (transitions-as-clinical-events)" },
                { id: 'ECHO-002-INTAKE', name: "Intake", tier: 'operational', purpose: "Not everyone is suitable for AI-assisted therapy. CAIRN is designed for specific presentations within specific service contexts. Intake is where suitability is established.", refiningAuthority: "Service Manager with Clinical Lead (suitability criteria)", dependsOn: ["ECHO-001-CORE"] },
                { id: 'ECHO-003-ROUTING', name: "Routing", tier: 'operational', purpose: "The routing decision: once intake is complete, which path through the service is most appropriate? Routing logic, caseload balancing, clinical-pathway alignment.", refiningAuthority: "Service Manager (routing logic and caseload balancing)", dependsOn: ["ECHO-001-CORE", "ECHO-002-INTAKE"] },
                { id: 'ECHO-004-STEPUP', name: "Step-Up", tier: 'operational', purpose: "Step-Up Crossing: when current provision is not sufficient for the client presentation, how escalation to higher-intensity care is handled without abandonment.", refiningAuthority: "Service Manager with Clinical Lead (escalation pathways)", dependsOn: ["ECHO-001-CORE", "ECHO-002-INTAKE"] },
                { id: 'ECHO-005-STEPDOWN', name: "Step-Down", tier: 'operational', purpose: "Ending therapy is a significant event. It should be marked, not just drift away. A graduation ritual architecture for clinically appropriate step-down.", refiningAuthority: "Service Manager with Clinical Lead (completion architecture)", dependsOn: ["ECHO-001-CORE", "ECHO-003-ROUTING", "ECHO-004-STEPUP"] },
                { id: 'ECHO-006-HANDOFF', name: "Handoff", tier: 'operational', purpose: "The handoff package architecture: what information accompanies a transition, how handoff fidelity is assessed, what happens when fidelity falls below threshold.", refiningAuthority: "Service Manager with Head of IG (handoff fidelity)", dependsOn: ["ECHO-001-CORE"], workedExample: 'echo' },
                { id: 'ECHO-007-DISCHARGE', name: "Discharge", tier: 'operational', purpose: "Patient is genuinely ready and initiates ending. Or the pathway ends for other clinical reasons. Discharge is a specific crossing distinct from step-down, with its own architecture.", refiningAuthority: "Service Manager with Clinical Lead", dependsOn: ["ECHO-001-CORE", "ECHO-003-ROUTING"] },
                { id: 'ECHO-008-BRIDGE', name: "Bridge Protocol", tier: 'operational', purpose: "Maintenance, stability, not new intensive work. The Bridge Protocol governs the active-support window that holds a patient during transition until the receiving service confirms care.", refiningAuthority: "Service Manager (active-support window governance)", dependsOn: ["ECHO-001-CORE", "ECHO-002-INTAKE", "ECHO-003-ROUTING", "ECHO-004-STEPUP", "ECHO-005-STEPDOWN", "ECHO-006-HANDOFF", "ECHO-007-DISCHARGE"], workedExample: 'echo' },
                { id: 'ECHO-009-INTEGRATION', name: "Integration", tier: 'integration', purpose: "The integration surface: with CAIRN (transition prompt signalling), AEGIS (crisis-triggered transitions), MNEMOSYNE (handoff-appropriate context extraction), HERMES (NHS-compliant output).", refiningAuthority: "Service Manager with CCIO (HERMES and EPR integration)", dependsOn: ["ECHO-001-CORE"] },
                { id: 'ECHO-010-BOUNDARIES', name: "Boundaries", tier: 'governance', purpose: "What ECHO does not do: initiate transitions autonomously, override clinical judgement about transition appropriateness, complete transitions without confirmed receipt, write directly to NHS systems.", refiningAuthority: "Service Manager (what ECHO does not initiate)", dependsOn: ["ECHO-001-CORE", "ECHO-009-INTEGRATION"] },
                { id: 'ECHO-011-SYSTEM', name: "System", tier: 'system', purpose: "The master operational protocol for ECHO. Compressed identity synthesis, the Seven Crossings activation framework, integrated decision logic, boot verification.", refiningAuthority: "Service Manager with Head of IG (operational synthesis)", dependsOn: ["ECHO-001-CORE", "ECHO-002-INTAKE", "ECHO-003-ROUTING", "ECHO-004-STEPUP", "ECHO-005-STEPDOWN", "ECHO-006-HANDOFF", "ECHO-007-DISCHARGE", "ECHO-008-BRIDGE", "ECHO-009-INTEGRATION", "ECHO-010-BOUNDARIES"] }
            ]
        },
        hermes: {
            name: "HERMES",
            subtitle: "The Bridge Stone",
            tagline: "The architectural surface where the ecosystem meets the NHS.",
            specVersion: "1.0.0",
            roleStatement: "HERMES is the NHS interoperability gateway. It translates session data into standardised healthcare dialects: SNOMED CT for clinical concepts, ICD-10 for diagnostic coding, FHIR UK Core for structured interchange, HL7v2 for legacy EPR integration. It adapts to the specific EPR systems deployed in UK mental health Trusts: RiO, SystmOne, EMIS Web. Implements consent architecturally rather than through policy \u2014 every information flow passes through a consent check that cannot be bypassed by downstream components.",
            refinementSurface: "HERMES refinement is distributed across four professional authorities \u2014 CCIO for documentation and integration surface, Digital Integration Lead for translation and EPR adapters, DPO for consent architecture, CSO for audit trail. The four-way convenes when refinements cross multiple authorities simultaneously, which the consent architecture in particular tends to require.",
